# Render Blueprint — https://dashboard.render.com/blueprints
# Connect this GitHub repo, then apply the blueprint (or create a Web Service manually).

services:
  - type: web
    name: football-analyzer
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    # --include=dev so Vite/TypeScript install even when NODE_ENV=production
    buildCommand: npm install --include=dev && npm run db:generate && npm run build && npm run db:push && npm run sync:real
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:./dev.db
